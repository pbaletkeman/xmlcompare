name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        working-directory: ./python
        run: python -m ruff check .

      - name: Run tests
        working-directory: ./python
        run: pytest tests/ -v

  java-gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        working-directory: ./java
        run: ./gradlew build --no-daemon

      - name: Check code style with Checkstyle
        working-directory: ./java
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      - name: Generate code coverage report
        working-directory: ./java
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./java/build/reports/jacoco/test/jacocoTestReport.xml
          flags: java-gradle
          name: java-gradle-coverage

  java-maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./java
        run: mvn clean package

      - name: Check code style with Checkstyle
        working-directory: ./java
        run: mvn checkstyle:check

      - name: Generate code coverage report
        working-directory: ./java
        run: mvn jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./java/target/site/jacoco/jacoco.xml
          flags: java-maven
          name: java-maven-coverage

  xsd-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Test XSD validation (Java)
        working-directory: ./java
        run: ./gradlew test --tests XsdValidatorTest -v --no-daemon

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install lxml pytest

      - name: Test XSD validation (Python)
        working-directory: ./python
        run: pytest tests/test_xsd_validation.py -v

  fat-jar:
    runs-on: ubuntu-latest
    needs: java-maven
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR (Maven)
        working-directory: ./java
        run: mvn clean package -DskipTests

      - name: Verify fat JAR works
        working-directory: ./java
        run: java -jar target/xmlcompare-1.0.0.jar --help

      - name: Build fat JAR (Gradle)
        working-directory: ./java
        run: ./gradlew jar --no-daemon

      - name: Verify Gradle fat JAR works
        working-directory: ./java
        run: java -jar build/libs/xmlcompare-1.0.0.jar --help

  python-wheel:
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build wheel setuptools

      - name: Build wheel
        working-directory: ./python
        run: python -m build

      - name: List dist artifacts
        working-directory: ./python
        run: ls -lh dist/
